document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

     #0a0a0a;\n    --line:        #1a1a1a;\n    --line-2:      #262626;\n    --line-3:      #333333;\n\n    --cyan:        #2dd4d4;          /* primary teal accent */\n    --cyan-soft:   #5eead4;\n    --cyan-deep:   #0e9494;\n    --cyan-dim:    rgba(45,212,212,0.08);\n\n    --blue:        #3b82f6;          /* primary CTA blue */\n    --blue-soft:   #60a5fa;\n\n    --white:       #ffffff;\n    --text:        #d4d4d4;\n    --muted:       #9ca3af;\n    --muted-2:     #6b7280;\n    --muted-3:     #3f3f46;\n\n    --mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'Courier New', monospace;\n  }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--mono);\n    font-size: 15px;\n    line-height: 1.65;\n    overflow-x: hidden;\n    font-weight: 400;\n    letter-spacing: 0;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    /* JetBrains Mono character variants — matches oorb.io's typographic feel */\n    font-feature-settings:\n      \"calt\" 1,\n      \"liga\" 1,\n      \"zero\" 1,\n      \"ss01\" 1,\n      \"ss02\" 1,\n      \"ss19\" 1,\n      \"cv02\" 1,\n      \"cv06\" 1,\n      \"cv11\" 1;\n    font-variant-ligatures: contextual common-ligatures;\n  }\n\n  /* Vertical grid hairlines */\n  .grid-overlay {\n    position: fixed;\n    inset: 0;\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  .grid-overlay .gline {\n    position: absolute;\n    top: 0;\n    bottom: 0;\n    width: 1px;\n    background: rgba(255,255,255,0.03);\n  }\n  .grid-overlay .gline:nth-child(1) { left: 8%; }\n  .grid-overlay .gline:nth-child(2) { left: 33%; }\n  .grid-overlay .gline:nth-child(3) { left: 67%; }\n  .grid-overlay .gline:nth-child(4) { left: 92%; }\n\n  /* Rotated side label */\n  .side-label {\n    position: fixed;\n    left: 16px;\n    top: 50%;\n    transform: translateY(-50%) rotate(-90deg);\n    transform-origin: left center;\n    font-family: var(--mono);\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.4em;\n    color: var(--muted-3);\n    white-space: nowrap;\n    z-index: 5;\n    pointer-events: none;\n  }\n\n  /* PROGRESS */\n  #progress-bar {\n    position: fixed;\n    top: 0; left: 0;\n    height: 2px;\n    background: var(--cyan);\n    box-shadow: 0 0 8px rgba(45,212,212,0.6);\n    width: 0%;\n    z-index: 1000;\n    transition: width 0.1s linear;\n  }\n\n  /* NAV */\n  nav {\n    position: fixed;\n    top: 0; left: 0; right: 0;\n    background: rgba(0,0,0,0.85);\n    backdrop-filter: blur(12px);\n    -webkit-backdrop-filter: blur(12px);\n    z-index: 999;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 18px 36px;\n    border-bottom: 1px solid var(--line);\n  }\n\n  nav .brand {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n\n  nav .brand-mark {\n    width: 32px;\n    height: 32px;\n    flex-shrink: 0;\n  }\n\n  nav .brand-text {\n    font-family: var(--mono);\n    font-size: 14.5px;\n    font-weight: 600;\n    color: var(--white);\n    letter-spacing: 0;\n    text-transform: lowercase;\n  }\n\n  nav .brand-text .dot { color: var(--cyan); padding: 0 1px; }\n\n  nav .nav-tabs {\n    list-style: none;\n    display: flex;\n    gap: 4px;\n    align-items: center;\n    border: 1px solid var(--line-2);\n    padding: 6px;\n    background: var(--bg-elev);\n  }\n\n  nav .nav-tabs li {\n    display: flex;\n    align-items: stretch;\n    gap: 6px;\n  }\n\n  nav .nav-tabs li a {\n    color: var(--white);\n    text-decoration: none;\n    font-family: var(--mono);\n    font-size: 12.5px;\n    font-weight: 500;\n    letter-spacing: 0.04em;\n    transition: all 0.15s;\n    padding: 6px 14px;\n    text-transform: uppercase;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    position: relative;\n  }\n\n  nav .nav-tabs li.is-active a::before {\n    content: '';\n    position: absolute;\n    left: 0;\n    top: 50%;\n    transform: translateY(-50%);\n    width: 3px;\n    height: 14px;\n    background: var(--cyan);\n  }\n\n  nav .nav-tabs li a:hover { color: var(--cyan); }\n\n  nav .nav-actions {\n    display: flex;\n    gap: 10px;\n    align-items: center;\n  }\n\n  .nav-btn {\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: transparent;\n    border: 1px solid var(--white);\n    color: var(--white);\n    padding: 10px 22px;\n    font-family: var(--mono);\n    font-size: 12.5px;\n    font-weight: 600;\n    letter-spacing: 0.04em;\n    cursor: pointer;\n    overflow: hidden;\n    isolation: isolate;\n    transition: color 0.35s cubic-bezier(.65,.05,.36,1),\n                border-color 0.35s cubic-bezier(.65,.05,.36,1);\n    text-decoration: none;\n    text-transform: uppercase;\n    border-radius: 0;\n  }\n  .nav-btn .nav-btn-label { position: relative; z-index: 1; }\n  .nav-btn .btn-arrow {\n    position: relative;\n    z-index: 1;\n    transition: transform 0.35s cubic-bezier(.65,.05,.36,1);\n  }\n  .nav-btn::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    z-index: 0;\n    background: var(--white);\n    transform: translateX(-101%);\n    transition: transform 0.45s cubic-bezier(.65,.05,.36,1);\n  }\n  .nav-btn:hover::before { transform: translateX(0); }\n  .nav-btn:hover {\n    color: var(--bg);\n    border-color: var(--white);\n  }\n  .nav-btn:hover .btn-arrow { transform: translateY(2px); }\n\n  .nav-btn.primary {\n    background: var(--blue);\n    border-color: var(--blue);\n    color: var(--white);\n  }\n  .nav-btn.primary::before { background: var(--white); }\n  .nav-btn.primary:hover {\n    color: var(--blue);\n    border-color: var(--white);\n  }\n\n  /* HERO */\n  #hero {\n    min-height: 100vh;\n    display: flex;\n    align-items: center;\n    padding: 130px 80px 80px;\n    position: relative;\n    z-index: 2;\n  }\n\n  .hero-frame {\n    width: 100%;\n    max-width: 760px;\n  }\n\n  .hero-status {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 36px;\n    padding: 7px 14px;\n    border: 1px solid var(--cyan);\n    background: var(--cyan-dim);\n    font-family: var(--mono);\n    font-size: 11.5px;\n    color: var(--cyan);\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n  }\n\n  .hero-status .pulse-dot {\n    width: 7px;\n    height: 7px;\n    background: var(--cyan);\n    box-shadow: 0 0 0 0 rgba(45,212,212,0.5);\n    animation: pulse-ring 2s ease-out infinite;\n  }\n\n  @keyframes pulse-ring {\n    0%   { box-shadow: 0 0 0 0 rgba(45,212,212,0.6); }\n    70%  { box-shadow: 0 0 0 8px rgba(45,212,212,0); }\n    100% { box-shadow: 0 0 0 0 rgba(45,212,212,0); }\n  }\n\n  .hero-name {\n    font-family: var(--mono);\n    font-size: clamp(34px, 5.4vw, 64px);\n    font-weight: 800;\n    color: var(--white);\n    line-height: 1.02;\n    letter-spacing: -0.025em;\n    margin-bottom: 12px;\n    text-transform: uppercase;\n  }\n\n  .hero-tag {\n    font-family: var(--mono);\n    font-size: clamp(20px, 2.6vw, 30px);\n    font-weight: 700;\n    color: var(--cyan);\n    line-height: 1.1;\n    letter-spacing: -0.005em;\n    margin-bottom: 36px;\n    text-transform: uppercase;\n  }\n\n  .hero-tag .white {\n    color: var(--white);\n  }\n\n  .hero-bio {\n    max-width: 620px;\n    margin: 0 0 38px;\n    font-size: 15.5px;\n    line-height: 1.7;\n    color: var(--text);\n    font-weight: 400;\n  }\n\n  .hero-bio strong {\n    color: var(--white);\n    font-weight: 600;\n  }\n\n  .hero-bio .hl {\n    color: var(--cyan);\n    font-weight: 500;\n  }\n\n  .hero-actions {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 14px;\n    margin-bottom: 50px;\n  }\n\n  .btn {\n    position: relative;\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    padding: 16px 32px;\n    font-family: var(--mono);\n    font-size: 13px;\n    font-weight: 600;\n    letter-spacing: 0.06em;\n    text-decoration: none;\n    cursor: pointer;\n    overflow: hidden;\n    isolation: isolate;\n    transition: color 0.35s cubic-bezier(.65,.05,.36,1),\n                border-color 0.35s cubic-bezier(.65,.05,.36,1),\n                transform 0.25s ease;\n    border: 1px solid var(--blue);\n    background: var(--blue);\n    color: var(--white);\n    text-transform: uppercase;\n    border-radius: 6px;\n  }\n\n  /* Sliding fill — oorb.io-style swipe from left */\n  .btn::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    z-index: -1;\n    background: var(--white);\n    transform: translateX(-101%);\n    transition: transform 0.45s cubic-bezier(.65,.05,.36,1);\n  }\n  .btn:hover::before { transform: translateX(0); }\n  .btn:hover {\n    color: var(--blue);\n    border-color: var(--white);\n  }\n\n  /* Arrow slide */\n  .btn .btn-arrow {\n    display: inline-block;\n    transition: transform 0.35s cubic-bezier(.65,.05,.36,1);\n    will-change: transform;\n  }\n  .btn:hover .btn-arrow { transform: translateX(4px); }\n\n  /* Secondary: outlined white, fills white on hover */\n  .btn.secondary {\n    background: var(--bg);\n    color: var(--white);\n    border-color: var(--white);\n  }\n  .btn.secondary::before { background: var(--white); }\n  .btn.secondary:hover {\n    color: var(--bg);\n    border-color: var(--white);\n  }\n\n  /* Ghost: subtle line button, fills cyan-tint on hover */\n  .btn.ghost {\n    background: transparent;\n    border-color: var(--line-2);\n    color: var(--white);\n  }\n  .btn.ghost::before { background: var(--cyan); }\n  .btn.ghost:hover {\n    color: var(--bg);\n    border-color: var(--cyan);\n  }\n\n  .btn:active { transform: translateY(1px); }\n\n  .hero-creds {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    max-width: 640px;\n    border: 1px solid var(--line-2);\n    background: var(--bg-card);\n  }\n\n  .hero-cred {\n    display: flex;\n    flex-direction: column;\n    gap: 6px;\n    padding: 18px 22px;\n    min-width: 0;\n  }\n\n  .hero-cred + .hero-cred {\n    border-left: 1px solid var(--line-2);\n  }\n\n  .hero-cred .lbl {\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--muted);\n    letter-spacing: 0.1em;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    text-transform: uppercase;\n  }\n\n  .hero-cred .lbl::before {\n    content: '';\n    width: 6px;\n    height: 6px;\n    background: var(--cyan);\n    flex-shrink: 0;\n  }\n\n  .hero-cred .val {\n    font-family: var(--mono);\n    font-size: 14.5px;\n    font-weight: 600;\n    color: var(--white);\n    letter-spacing: 0;\n  }\n\n  .hero-cred .val em {\n    color: var(--cyan);\n    font-style: normal;\n    font-weight: 600;\n  }\n\n  .hero-contact {\n    margin-top: 28px;\n    font-family: var(--mono);\n    font-size: 13px;\n    color: var(--muted);\n    letter-spacing: 0;\n  }\n\n  .hero-contact a {\n    color: var(--cyan);\n    text-decoration: none;\n    transition: color 0.2s;\n  }\n  .hero-contact a:hover { color: var(--cyan-soft); }\n\n  .hero-contact .sep {\n    color: var(--muted-3);\n    margin: 0 10px;\n  }\n\n  /* Hero right-side: real CAD-wireframe robotic arm photograph */\n  .hero-art {\n    position: absolute;\n    top: 50%;\n    right: 0;\n    transform: translateY(-50%);\n    width: 60%;\n    max-width: 880px;\n    height: 100%;\n    max-height: 980px;\n    pointer-events: none;\n    z-index: 0;\n    overflow: hidden;\n  }\n  .hero-art .arm-img {\n    position: absolute;\n    inset: 0;\n    width: 100%;\n    height: 100%;\n    background-image: url(\"ea8ea03b-f52d-4b6a-916f-808a1ca61707\");\n    background-repeat: no-repeat;\n    background-position: center right;\n    background-size: contain;\n    filter: brightness(1.08) contrast(1.1) saturate(1.15);\n    /* fade left edge into pure black so it blends behind hero text */\n    -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.5) 22%, #000 55%);\n    mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.5) 22%, #000 55%);\n    animation: arm-float 14s ease-in-out infinite;\n  }\n  /* cyan scanline overlay across the arm — oorb HUD feel */\n  .hero-art::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: repeating-linear-gradient(\n      to bottom,\n      transparent 0,\n      transparent 3px,\n      rgba(45,212,212,0.045) 3px,\n      rgba(45,212,212,0.045) 4px\n    );\n    mix-blend-mode: screen;\n    pointer-events: none;\n    z-index: 2;\n  }\n  /* corner brackets — engineering schematic vibe */\n  .hero-art::after {\n    content: '';\n    position: absolute;\n    inset: 8% 4% 8% 16%;\n    border: 1px solid rgba(45,212,212,0.15);\n    pointer-events: none;\n  }\n  .arm-corner {\n    position: absolute;\n    width: 18px;\n    height: 18px;\n    border: 1px solid var(--cyan);\n    z-index: 3;\n  }\n  .arm-corner.tl { top: 8%; left: 16%; border-right: 0; border-bottom: 0; }\n  .arm-corner.tr { top: 8%; right: 4%;  border-left: 0; border-bottom: 0; }\n  .arm-corner.bl { bottom: 8%; left: 16%; border-right: 0; border-top: 0; }\n  .arm-corner.br { bottom: 8%; right: 4%;  border-left: 0; border-top: 0; }\n  @keyframes arm-float {\n    0%, 100% { transform: translateY(0); }\n    50%      { transform: translateY(-10px); }\n  }\n  /* technical readout overlay top-right */\n  .arm-readout {\n    position: absolute;\n    top: 10%;\n    right: 6%;\n    z-index: 4;\n    display: flex;\n    flex-direction: column;\n    gap: 6px;\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    padding: 12px 14px;\n    background: rgba(0,0,0,0.6);\n    border: 1px solid rgba(45,212,212,0.35);\n    backdrop-filter: blur(2px);\n    min-width: 150px;\n  }\n  .arm-readout-line {\n    display: flex;\n    justify-content: space-between;\n    gap: 18px;\n  }\n  .arm-readout .ar-k { color: var(--muted); }\n  .arm-readout .ar-v { color: var(--white); font-weight: 600; }\n  /* readability gradient — fade hero LEFT side to pure black behind copy */\n  #hero::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: linear-gradient(to right, #000 0%, #000 26%, rgba(0,0,0,0.85) 42%, rgba(0,0,0,0.4) 62%, transparent 80%);\n    z-index: 1;\n    pointer-events: none;\n  }\n  /* faint cyan vignette glow */\n  #hero::after {\n    content: '';\n    position: absolute;\n    top: 50%; right: 14%;\n    width: 700px; height: 700px;\n    transform: translateY(-50%);\n    background: radial-gradient(circle, rgba(45,212,212,0.10) 0%, transparent 60%);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero-frame { position: relative; z-index: 2; }\n\n  /* SECTIONS */\n  section {\n    max-width: 1280px;\n    margin: 0 auto;\n    padding: 80px 80px;\n    position: relative;\n    z-index: 2;\n    opacity: 0;\n    transform: translateY(20px);\n    transition: opacity 0.7s ease, transform 0.7s ease;\n  }\n\n  section.visible {\n    opacity: 1;\n    transform: translateY(0);\n  }\n\n  /* Section dividers - cyan accent line above title row */\n  section.divided {\n    border-top: 1px solid var(--line);\n  }\n\n  .section-header {\n    text-align: center;\n    margin-bottom: 70px;\n    position: relative;\n  }\n\n  .section-num {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--cyan);\n    margin-bottom: 18px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n  }\n\n  .section-num::before {\n    content: '';\n    width: 8px;\n    height: 8px;\n    background: var(--cyan);\n  }\n\n  .section-title {\n    font-family: var(--mono);\n    font-size: clamp(26px, 3vw, 36px);\n    font-weight: 800;\n    color: var(--white);\n    letter-spacing: -0.01em;\n    line-height: 1.15;\n    text-transform: uppercase;\n    margin-bottom: 18px;\n    display: inline-block;\n  }\n\n  .section-title .accent {\n    color: var(--cyan);\n  }\n\n  .section-underline {\n    display: block;\n    width: 60px;\n    height: 2px;\n    background: var(--cyan);\n    margin: 0 auto;\n  }\n\n  .section-header.left {\n    text-align: left;\n    margin-bottom: 50px;\n  }\n  .section-header.left .section-underline {\n    margin: 0;\n  }\n\n  /* Universal card */\n  .card {\n    background: var(--bg-card);\n    border: 1px solid var(--line-2);\n    padding: 28px 30px;\n    border-radius: 0;\n    transition: all 0.2s;\n    position: relative;\n  }\n\n  .card:hover {\n    border-color: var(--cyan);\n  }\n\n  /* PROJECTS */\n  .projects-grid {\n    display: grid;\n    grid-template-columns: repeat(3, minmax(0, 1fr));\n    gap: 0;\n    border: 1px solid var(--line-2);\n  } @media (max-width: 1100px) { .projects-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } } \n\n  .projects-grid .card {\n    border: none;\n    border-right: 1px solid var(--line-2);\n    border-bottom: 1px solid var(--line-2);\n    background: var(--bg);\n  }\n\n  .projects-grid .card:hover {\n    background: var(--bg-card);\n    border-color: var(--line-2);\n  }\n\n  .project-card {\n    display: flex;\n    flex-direction: column;\n  }\n\n  .project-header {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-start;\n    gap: 16px;\n    margin-bottom: 22px;\n    padding-bottom: 18px;\n    border-bottom: 1px solid var(--line);\n  }\n\n  .project-name {\n    font-family: var(--mono);\n    font-size: 18px;\n    font-weight: 700;\n    color: var(--white);\n    line-height: 1.3;\n    letter-spacing: 0.01em;\n    text-transform: uppercase;\n  }\n\n  .project-name em {\n    font-style: normal;\n    color: var(--cyan);\n    font-weight: 600;\n    text-transform: none;\n    display: block;\n    font-size: 13.5px;\n    margin-top: 4px;\n    letter-spacing: 0.02em;\n  }\n\n  .project-year {\n    font-family: var(--mono);\n    font-size: 11.5px;\n    color: var(--muted);\n    letter-spacing: 0.1em;\n    white-space: nowrap;\n    padding: 4px 8px;\n    border: 1px solid var(--line-2);\n    text-transform: uppercase;\n  }\n\n  .project-rows { display: grid; gap: 14px; flex: 1; margin-bottom: 22px; }\n\n  .project-row {\n    display: grid;\n    grid-template-columns: 88px 1fr;\n    gap: 18px;\n    align-items: start;\n  }\n\n  .project-label {\n    font-family: var(--mono);\n    font-size: 11.5px;\n    color: var(--muted);\n    letter-spacing: 0.12em;\n    padding-top: 2px;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    text-transform: uppercase;\n  }\n\n  .project-label::before {\n    content: '';\n    display: inline-block;\n    width: 5px;\n    height: 5px;\n    background: var(--cyan);\n    flex-shrink: 0;\n  }\n\n  .project-value {\n    font-family: var(--mono);\n    font-size: 14.5px;\n    color: var(--text);\n    line-height: 1.6;\n  }\n\n  .project-value.result {\n    color: var(--white);\n    font-weight: 500;\n  }\n\n  .project-footer {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    gap: 14px;\n    flex-wrap: wrap;\n    padding-top: 18px;\n    border-top: 1px solid var(--line);\n  }\n\n  /* TAGS */\n  .tags { display: flex; flex-wrap: wrap; gap: 6px; }\n\n  .tag {\n    font-family: var(--mono);\n    font-size: 11.5px;\n    letter-spacing: 0.05em;\n    color: var(--text);\n    border: 1px solid var(--line-2);\n    padding: 4px 8px;\n    transition: all 0.15s;\n    text-transform: uppercase;\n  }\n\n  .tag:hover {\n    border-color: var(--cyan);\n    color: var(--cyan);\n  }\n\n  .github-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: transparent;\n    border: 1px solid var(--line-2);\n    color: var(--white);\n    padding: 9px 16px;\n    font-family: var(--mono);\n    font-size: 12.5px;\n    font-weight: 500;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    text-decoration: none;\n    cursor: pointer;\n    transition: all 0.15s;\n    white-space: nowrap;\n    border-radius: 0;\n  }\n\n  .github-btn svg { width: 13px; height: 13px; fill: currentColor; }\n\n  .github-btn:hover {\n    border-color: var(--cyan);\n    color: var(--cyan);\n  }\n\n  .github-btn.private {\n    opacity: 0.5;\n    cursor: not-allowed;\n    pointer-events: none;\n  }\n\n  /* SYSTEMS / NOW GRID */\n  .systems-grid,\n  .now-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(258px, 1fr));\n    gap: 0;\n    border: 1px solid var(--line-2);\n  }\n\n  .system-card,\n  .now-card {\n    background: var(--bg);\n    border-right: 1px solid var(--line-2);\n    border-bottom: 1px solid var(--line-2);\n    padding: 30px 28px;\n    transition: all 0.2s;\n    position: relative;\n  }\n\n  .system-card:hover,\n  .now-card:hover {\n    background: var(--bg-card);\n  }\n\n  .system-card .icon-wrap,\n  .now-card .icon-wrap {\n    width: 32px;\n    height: 32px;\n    margin-bottom: 20px;\n    color: var(--cyan);\n    display: inline-flex;\n  }\n  .system-card .icon-wrap svg,\n  .now-card .icon-wrap svg { width: 100%; height: 100%; }\n\n  .system-card h4,\n  .now-card h4 {\n    font-family: var(--mono);\n    font-size: 15px;\n    font-weight: 700;\n    color: var(--white);\n    margin-bottom: 12px;\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n  }\n\n  .system-card p,\n  .now-card p {\n    font-family: var(--mono);\n    font-size: 14px;\n    color: var(--muted);\n    line-height: 1.6;\n  }\n\n  /* EXPERIENCE */\n  .exp-card {\n    background: var(--bg-card);\n    border: 1px solid var(--line-2);\n    padding: 36px 38px;\n    position: relative;\n    border-radius: 0;\n  }\n\n  .exp-header {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-start;\n    gap: 16px;\n    flex-wrap: wrap;\n    padding-bottom: 22px;\n    border-bottom: 1px solid var(--line);\n    margin-bottom: 26px;\n  }\n\n  .exp-role {\n    font-family: var(--mono);\n    font-size: 18px;\n    font-weight: 700;\n    color: var(--white);\n    line-height: 1.4;\n    letter-spacing: 0.02em;\n    text-transform: uppercase;\n  }\n\n  .exp-role .company {\n    color: var(--cyan);\n    font-style: normal;\n    font-weight: 700;\n  }\n\n  .exp-meta {\n    text-align: right;\n  }\n\n  .exp-date {\n    font-family: var(--mono);\n    font-size: 13px;\n    color: var(--text);\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n  }\n\n  .exp-type {\n    font-family: var(--mono);\n    font-size: 11.5px;\n    color: var(--muted);\n    margin-top: 4px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n  }\n\n  .live-badge {\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    font-family: var(--mono);\n    font-size: 11px;\n    font-weight: 700;\n    color: var(--cyan);\n    border: 1px solid var(--cyan);\n    background: var(--cyan-dim);\n    padding: 2px 7px;\n    margin-left: 10px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    vertical-align: middle;\n  }\n\n  .live-badge::before {\n    content: '';\n    width: 5px; height: 5px;\n    background: var(--cyan);\n    animation: pulse 1.4s ease-in-out infinite;\n    box-shadow: 0 0 6px var(--cyan);\n  }\n\n  @keyframes pulse {\n    0%, 100% { opacity: 1; }\n    50% { opacity: 0.3; }\n  }\n\n  .exp-bullets {\n    list-style: none;\n    margin-bottom: 22px;\n  }\n\n  .exp-bullets li {\n    padding-left: 22px;\n    position: relative;\n    margin-bottom: 14px;\n    font-family: var(--mono);\n    font-size: 14.5px;\n    color: var(--text);\n    line-height: 1.65;\n  }\n\n  .exp-bullets li::before {\n    content: '▸';\n    position: absolute;\n    left: 0;\n    top: 0;\n    color: var(--cyan);\n    font-size: 12.5px;\n    line-height: 1.65;\n  }\n\n  .exp-bullets li strong {\n    color: var(--white);\n    font-weight: 600;\n  }\n\n  /* SKILLS */\n  .skills-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n    gap: 0;\n    border: 1px solid var(--line-2);\n  }\n\n  .skill-group {\n    background: var(--bg);\n    border-right: 1px solid var(--line-2);\n    border-bottom: 1px solid var(--line-2);\n    padding: 24px 26px;\n    transition: all 0.2s;\n  }\n\n  .skill-group:hover {\n    background: var(--bg-card);\n  }\n\n  .skill-group-header {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 18px;\n    padding-bottom: 14px;\n    border-bottom: 1px solid var(--line);\n  }\n\n  .skill-group-header .dot-orn {\n    width: 8px;\n    height: 8px;\n    background: var(--cyan);\n    flex-shrink: 0;\n  }\n\n  .skill-group-title {\n    font-family: var(--mono);\n    font-size: 13.5px;\n    font-weight: 700;\n    color: var(--white);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n\n  /* EDUCATION */\n  .edu-card {\n    background: var(--bg-card);\n    border: 1px solid var(--line-2);\n    padding: 28px 32px;\n    margin-bottom: 0;\n    border-radius: 0;\n  }\n  .edu-card + .edu-card {\n    border-top: none;\n  }\n\n  .edu-header {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    gap: 16px;\n    flex-wrap: wrap;\n    margin-bottom: 10px;\n  }\n\n  .edu-name {\n    font-family: var(--mono);\n    font-size: 15.5px;\n    font-weight: 700;\n    color: var(--white);\n    letter-spacing: 0.02em;\n    text-transform: uppercase;\n  }\n\n  .edu-date {\n    font-family: var(--mono);\n    font-size: 12.5px;\n    color: var(--muted);\n    letter-spacing: 0.05em;\n  }\n\n  .edu-sub {\n    font-family: var(--mono);\n    font-size: 14px;\n    color: var(--text);\n  }\n\n  .cert-list {\n    list-style: none;\n  }\n\n  .cert-list li {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    padding: 16px 0;\n    border-bottom: 1px solid var(--line);\n    gap: 12px;\n  }\n\n  .cert-list li:last-child { border-bottom: none; }\n\n  .cert-name {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    font-family: var(--mono);\n    font-size: 14px;\n    color: var(--white);\n    font-weight: 500;\n  }\n\n  .cert-star {\n    width: 8px;\n    height: 8px;\n    background: var(--cyan);\n    flex-shrink: 0;\n  }\n\n  .cert-meta {\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--muted);\n    letter-spacing: 0.05em;\n    text-transform: uppercase;\n  }\n\n  /* CONTACT */\n  .contact-card {\n    background: var(--bg-card);\n    border: 1px solid var(--line-2);\n    padding: 60px 50px;\n    text-align: center;\n    position: relative;\n    border-radius: 0;\n    overflow: hidden;\n  }\n\n  .contact-card::before,\n  .contact-card::after {\n    content: '';\n    position: absolute;\n    width: 14px;\n    height: 14px;\n    border: 1px solid var(--cyan);\n  }\n  .contact-card::before { top: 14px; left: 14px; border-right: none; border-bottom: none; }\n  .contact-card::after  { bottom: 14px; right: 14px; border-left: none; border-top: none; }\n\n  .contact-card h4 {\n    font-family: var(--mono);\n    font-size: clamp(22px, 2.8vw, 32px);\n    font-weight: 700;\n    color: var(--white);\n    margin-bottom: 16px;\n    letter-spacing: 0.02em;\n    line-height: 1.2;\n    text-transform: uppercase;\n  }\n\n  .contact-card h4 .accent {\n    color: var(--cyan);\n  }\n\n  .contact-tagline {\n    font-family: var(--mono);\n    color: var(--text);\n    font-size: 15px;\n    margin-bottom: 32px;\n    max-width: 540px;\n    margin-left: auto;\n    margin-right: auto;\n    line-height: 1.7;\n  }\n\n  .contact-meta {\n    display: flex;\n    justify-content: center;\n    gap: 28px;\n    flex-wrap: wrap;\n    margin-bottom: 36px;\n    font-family: var(--mono);\n    font-size: 13px;\n    color: var(--text);\n  }\n\n  .contact-meta a {\n    color: var(--cyan);\n    text-decoration: none;\n  }\n  .contact-meta a:hover {\n    color: var(--cyan-soft);\n  }\n\n  .contact-actions {\n    display: flex;\n    justify-content: center;\n    flex-wrap: wrap;\n    gap: 14px;\n  }\n\n  /* FOOTER */\n  footer {\n    border-top: 1px solid var(--line);\n    padding: 50px 80px 40px;\n    font-family: var(--mono);\n    color: var(--muted);\n    position: relative;\n    z-index: 2;\n    margin-top: 60px;\n  }\n\n  .footer-top {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-start;\n    flex-wrap: wrap;\n    gap: 40px;\n    padding: 30px 36px;\n    border: 1px solid var(--cyan);\n    margin-bottom: 50px;\n  }\n\n  .footer-brand {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n\n  .footer-brand svg {\n    width: 38px;\n    height: 38px;\n    color: var(--cyan);\n  }\n\n  .footer-brand-text {\n    font-family: var(--mono);\n    font-size: 20px;\n    font-weight: 700;\n    color: var(--white);\n    letter-spacing: 0;\n    text-transform: lowercase;\n  }\n\n  .footer-brand-text .dot { color: var(--cyan); }\n\n  .footer-tagline {\n    text-align: right;\n    font-size: 13.5px;\n    color: var(--white);\n    max-width: 340px;\n    line-height: 1.65;\n  }\n\n  .footer-cols {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 40px;\n    margin-bottom: 50px;\n    padding: 0 36px;\n  }\n\n  .footer-col h5 {\n    font-family: var(--mono);\n    font-size: 13.5px;\n    color: var(--white);\n    text-transform: uppercase;\n    letter-spacing: 0.1em;\n    margin-bottom: 18px;\n    padding-bottom: 8px;\n    border-bottom: 2px solid var(--cyan);\n    display: inline-block;\n  }\n\n  .footer-col a, .footer-col span {\n    display: block;\n    color: var(--text);\n    font-size: 13.5px;\n    text-decoration: none;\n    margin-bottom: 10px;\n    transition: color 0.15s;\n  }\n\n  .footer-col a:hover { color: var(--cyan); }\n\n  .footer-bottom {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    flex-wrap: wrap;\n    gap: 16px;\n    padding: 28px 36px;\n    border: 1px solid var(--line-2);\n    font-size: 12.5px;\n    color: var(--muted);\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n\n  .footer-bottom .blink-dot {\n    display: inline-block;\n    width: 6px; height: 6px;\n    background: var(--cyan);\n    margin-right: 8px;\n    animation: pulse 1.4s ease-in-out infinite;\n    vertical-align: middle;\n    box-shadow: 0 0 8px var(--cyan);\n  }\n\n  /* ─────────────────────────────────────────────\n     ENHANCEMENT LAYER — added by /enhance\n     light theme, focus, skip link, theme toggle,\n     command palette, marquee, stats, motion polish,\n     toast, back-to-top, mobile drawer\n     ───────────────────────────────────────────── */\n\n  /* Light theme override — toggled via [data-theme=\"light\"] on <html> */\n  html[data-theme=\"light\"] {\n    --bg:        #fafafa;\n    --bg-elev:   #ffffff;\n    --bg-card:   #ffffff;\n    --line:      #e5e5e5;\n    --line-2:    #d4d4d4;\n    --line-3:    #a3a3a3;\n    --cyan:      #0e9494;\n    --cyan-soft: #2dd4d4;\n    --cyan-deep: #0a6b6b;\n    --cyan-dim:  rgba(14,148,148,0.10);\n    --blue:      #1d4ed8;\n    --blue-soft: #3b82f6;\n    --white:     #0a0a0a;\n    --text:      #1f1f1f;\n    --muted:     #525252;\n    --muted-2:   #737373;\n    --muted-3:   #a3a3a3;\n  }\n  html[data-theme=\"light\"] body { background: var(--bg); color: var(--text); }\n  html[data-theme=\"light\"] nav { background: rgba(255,255,255,0.85); }\n  html[data-theme=\"light\"] .grid-overlay .gline { background: rgba(0,0,0,0.04); }\n  html[data-theme=\"light\"] #__bundler_thumbnail { background: var(--bg); }\n  html[data-theme=\"light\"] .arm-readout { background: rgba(0,0,0,0.04); }\n\n  /* Skip-to-content link (keyboard-accessible jump) */\n  .skip-link {\n    position: fixed;\n    top: -100px;\n    left: 12px;\n    z-index: 10000;\n    background: var(--cyan);\n    color: #000;\n    padding: 10px 16px;\n    font: 600 12px/1 var(--mono);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    text-decoration: none;\n    border: 1px solid var(--cyan-deep);\n    transition: top 0.2s ease;\n  }\n  .skip-link:focus { top: 12px; outline: 2px solid var(--white); outline-offset: 2px; }\n\n  /* Universal focus-visible: keyboard-only outline */\n  :focus { outline: none; }\n  :focus-visible {\n    outline: 2px solid var(--cyan);\n    outline-offset: 3px;\n    border-radius: 2px;\n  }\n  a:focus-visible, button:focus-visible {\n    outline: 2px solid var(--cyan);\n    outline-offset: 3px;\n  }\n\n  /* Better selection */\n  ::selection { background: var(--cyan); color: #000; }\n\n  /* Custom scrollbar */\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-track { background: var(--bg-elev); }\n  ::-webkit-scrollbar-thumb { background: var(--line-3); border: 2px solid var(--bg-elev); }\n  ::-webkit-scrollbar-thumb:hover { background: var(--cyan-deep); }\n\n  /* Icon-button base used by theme toggle, palette button, mobile menu, back-to-top */\n  .icon-btn {\n    width: 36px;\n    height: 36px;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    background: var(--bg-elev);\n    color: var(--text);\n    border: 1px solid var(--line-2);\n    cursor: pointer;\n    transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;\n    font-family: var(--mono);\n    font-size: 12px;\n  }\n  .icon-btn:hover { color: var(--cyan); border-color: var(--cyan); }\n  .icon-btn:active { transform: scale(0.95); }\n  .icon-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }\n  .icon-btn .sun  { display: none; }\n  .icon-btn .moon { display: block; }\n  html[data-theme=\"light\"] .icon-btn .sun  { display: block; }\n  html[data-theme=\"light\"] .icon-btn .moon { display: none; }\n\n  /* Palette-trigger pill (Cmd+K) */\n  .palette-trigger {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    height: 36px;\n    padding: 0 12px;\n    background: var(--bg-elev);\n    color: var(--muted);\n    border: 1px solid var(--line-2);\n    font: 500 12px/1 var(--mono);\n    cursor: pointer;\n    transition: color 0.15s, border-color 0.15s;\n  }\n  .palette-trigger:hover { color: var(--cyan); border-color: var(--cyan); }\n  .palette-trigger kbd {\n    font: 500 10.5px/1 var(--mono);\n    color: var(--text);\n    background: var(--bg);\n    border: 1px solid var(--line-2);\n    padding: 3px 6px;\n    border-radius: 2px;\n  }\n\n  /* Mobile-only hamburger */\n  .mobile-menu-btn { display: none; }\n\n  /* ── Command palette modal ── */\n  .palette-overlay {\n    position: fixed;\n    inset: 0;\n    background: rgba(0,0,0,0.6);\n    backdrop-filter: blur(6px);\n    -webkit-backdrop-filter: blur(6px);\n    z-index: 1100;\n    display: none;\n    align-items: flex-start;\n    justify-content: center;\n    padding-top: 14vh;\n    animation: paletteFade 0.15s ease;\n  }\n  html[data-theme=\"light\"] .palette-overlay { background: rgba(255,255,255,0.55); }\n  .palette-overlay.open { display: flex; }\n  @keyframes paletteFade { from { opacity: 0; } to { opacity: 1; } }\n\n  .palette {\n    width: min(560px, 92vw);\n    background: var(--bg-card);\n    border: 1px solid var(--line-2);\n    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(45,212,212,0.06);\n    display: flex;\n    flex-direction: column;\n    max-height: 60vh;\n    animation: paletteRise 0.18s ease;\n  }\n  @keyframes paletteRise { from { transform: translateY(-8px); opacity: 0; } to { transform: none; opacity: 1; } }\n  .palette-input {\n    width: 100%;\n    background: transparent;\n    border: none;\n    border-bottom: 1px solid var(--line-2);\n    color: var(--text);\n    padding: 18px 20px;\n    font: 400 15px/1.4 var(--mono);\n  }\n  .palette-input::placeholder { color: var(--muted-2); }\n  .palette-input:focus { outline: none; }\n  .palette-list { list-style: none; overflow-y: auto; padding: 6px; }\n  .palette-list li {\n    display: grid;\n    grid-template-columns: 24px 1fr auto;\n    align-items: center;\n    gap: 12px;\n    padding: 10px 14px;\n    cursor: pointer;\n    border-radius: 2px;\n    font: 500 13px/1.3 var(--mono);\n    color: var(--text);\n  }\n  .palette-list li .pi { color: var(--muted-2); display: inline-flex; }\n  .palette-list li .pi svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.6; }\n  .palette-list li .pmeta { color: var(--muted-2); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }\n  .palette-list li.active,\n  .palette-list li:hover {\n    background: var(--cyan-dim);\n    color: var(--cyan);\n  }\n  .palette-list li.active .pi,\n  .palette-list li:hover .pi { color: var(--cyan); }\n  .palette-list .palette-empty {\n    padding: 24px 14px;\n    text-align: center;\n    color: var(--muted-2);\n    font-size: 12.5px;\n    cursor: default;\n  }\n  .palette-list .palette-empty:hover { background: transparent; color: var(--muted-2); }\n  .palette-footer {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    border-top: 1px solid var(--line);\n    padding: 10px 16px;\n    color: var(--muted-2);\n    font: 500 10.5px/1 var(--mono);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n  .palette-footer kbd {\n    font-family: var(--mono);\n    color: var(--text);\n    background: var(--bg-elev);\n    border: 1px solid var(--line-2);\n    padding: 2px 6px;\n    margin: 0 2px;\n    border-radius: 2px;\n  }\n\n  /* ── Toast ── */\n  .toast-stack {\n    position: fixed;\n    bottom: 24px;\n    right: 24px;\n    z-index: 1200;\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n    pointer-events: none;\n  }\n  .toast {\n    background: var(--bg-card);\n    color: var(--text);\n    border: 1px solid var(--cyan);\n    border-left-width: 3px;\n    padding: 12px 16px;\n    font: 500 13px/1.3 var(--mono);\n    box-shadow: 0 8px 24px rgba(0,0,0,0.4);\n    animation: toastIn 0.25s ease;\n    pointer-events: auto;\n    min-width: 220px;\n    max-width: 340px;\n  }\n  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }\n  .toast.leaving { animation: toastOut 0.2s ease forwards; }\n  @keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }\n\n  /* ── Back-to-top ── */\n  .back-top {\n    position: fixed;\n    bottom: 24px;\n    left: 24px;\n    width: 42px;\n    height: 42px;\n    border: 1px solid var(--line-2);\n    background: var(--bg-elev);\n    color: var(--text);\n    z-index: 900;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    cursor: pointer;\n    opacity: 0;\n    transform: translateY(10px);\n    pointer-events: none;\n    transition: opacity 0.2s, transform 0.2s, color 0.15s, border-color 0.15s;\n    font-family: var(--mono);\n  }\n  .back-top.show { opacity: 1; transform: none; pointer-events: auto; }\n  .back-top:hover { color: var(--cyan); border-color: var(--cyan); }\n  .back-top svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }\n\n  /* ── Stats row (inside hero) ── */\n  .hero-stats {\n    display: grid;\n    grid-template-columns: repeat(4, minmax(0, 1fr));\n    border: 1px solid var(--line);\n    border-left: 3px solid var(--cyan);\n    margin-top: 32px;\n    max-width: 720px;\n    background: var(--bg-elev);\n  }\n  .hero-stat { padding: 18px 20px; border-right: 1px solid var(--line); }\n  .hero-stat:last-child { border-right: none; }\n  .hero-stat .stat-num {\n    display: block;\n    font: 700 24px/1 var(--mono);\n    color: var(--white);\n    letter-spacing: -0.02em;\n  }\n  .hero-stat .stat-num .pre,\n  .hero-stat .stat-num .suf { color: var(--cyan); font-weight: 500; font-size: 16px; }\n  .hero-stat .stat-lbl {\n    display: block;\n    margin-top: 6px;\n    font: 500 10px/1.3 var(--mono);\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    color: var(--muted);\n  }\n\n  /* ── Tech marquee ── */\n  .marquee {\n    position: relative;\n    padding: 22px 0;\n    border-top: 1px solid var(--line);\n    border-bottom: 1px solid var(--line);\n    background: var(--bg-elev);\n    overflow: hidden;\n    -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%);\n    mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%);\n  }\n  .marquee-track {\n    display: flex;\n    gap: 48px;\n    width: max-content;\n    animation: marquee 38s linear infinite;\n  }\n  .marquee:hover .marquee-track { animation-play-state: paused; }\n  .marquee-item {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    font: 500 13px/1 var(--mono);\n    color: var(--muted);\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    white-space: nowrap;\n  }\n  .marquee-item::before {\n    content: '';\n    width: 5px;\n    height: 5px;\n    background: var(--cyan);\n    border-radius: 50%;\n    flex-shrink: 0;\n    box-shadow: 0 0 8px var(--cyan);\n  }\n  @keyframes marquee {\n    from { transform: translate3d(0,0,0); }\n    to   { transform: translate3d(-50%, 0, 0); }\n  }\n\n  /* ── Card hover polish ── */\n  .project-card {\n    position: relative;\n    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;\n    overflow: hidden;\n  }\n  .project-card::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: radial-gradient(400px circle at var(--mx, 50%) var(--my, 50%), rgba(45,212,212,0.08), transparent 45%);\n    opacity: 0;\n    transition: opacity 0.25s;\n    pointer-events: none;\n  }\n  .project-card:hover { transform: translateY(-3px); border-color: var(--cyan); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }\n  .project-card:hover::before { opacity: 1; }\n\n  .system-card, .now-card { transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease; }\n  .system-card:hover, .now-card:hover {\n    transform: translateY(-2px);\n    border-color: var(--cyan);\n    background: var(--cyan-dim);\n  }\n\n  /* Hero name subtle sweep */\n  @keyframes nameSweep {\n    0%, 100% { background-position: 0% 50%; }\n    50%      { background-position: 100% 50%; }\n  }\n  .hero-name {\n    background: linear-gradient(90deg, var(--white) 0%, var(--white) 40%, var(--cyan) 50%, var(--white) 60%, var(--white) 100%);\n    background-size: 220% 100%;\n    -webkit-background-clip: text;\n    background-clip: text;\n    -webkit-text-fill-color: transparent;\n    animation: nameSweep 7s ease-in-out infinite;\n  }\n\n  /* Reveal stagger for cards inside a section */\n  .reveal-up { opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }\n  section.visible .reveal-up { opacity: 1; transform: none; }\n  section.visible .reveal-up:nth-child(1) { transition-delay: 0.05s; }\n  section.visible .reveal-up:nth-child(2) { transition-delay: 0.12s; }\n  section.visible .reveal-up:nth-child(3) { transition-delay: 0.19s; }\n  section.visible .reveal-up:nth-child(4) { transition-delay: 0.26s; }\n  section.visible .reveal-up:nth-child(5) { transition-delay: 0.33s; }\n\n  /* Mobile drawer */\n  .mobile-drawer {\n    position: fixed;\n    inset: 0;\n    background: var(--bg);\n    z-index: 998;\n    display: none;\n    flex-direction: column;\n    padding: 96px 28px 28px;\n    transform: translateY(-100%);\n    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);\n  }\n  .mobile-drawer.open { display: flex; transform: none; }\n  .mobile-drawer a {\n    display: block;\n    padding: 18px 0;\n    border-bottom: 1px solid var(--line);\n    color: var(--text);\n    text-decoration: none;\n    font: 500 16px/1 var(--mono);\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n  }\n  .mobile-drawer a:hover { color: var(--cyan); }\n  .mobile-drawer .mobile-cta {\n    margin-top: 24px;\n    display: flex;\n    flex-direction: column;\n    gap: 12px;\n  }\n\n  /* RESPONSIVE */\n  @media (max-width: 1100px) {\n    .hero-art { width: 100%; max-width: none; opacity: 0.35; }\n    .hero-art .arm-img {\n      -webkit-mask-image: radial-gradient(ellipse at 75% 50%, #000 0%, rgba(0,0,0,0.5) 45%, transparent 75%);\n      mask-image: radial-gradient(ellipse at 75% 50%, #000 0%, rgba(0,0,0,0.5) 45%, transparent 75%);\n    }\n    .arm-corner, .arm-readout { display: none; }\n    #hero::before {\n      background: linear-gradient(to right, #000 0%, rgba(0,0,0,0.92) 35%, rgba(0,0,0,0.5) 75%, transparent 100%);\n    }\n  }\n  @media (max-width: 900px) {\n    .side-label { display: none; }\n    nav { padding: 14px 18px; }\n    nav .nav-tabs { display: none; }\n    nav .brand-text { font-size: 12px; }\n    nav .nav-btn:not(.primary) { display: none; }\n    section { padding: 60px 24px; }\n    #hero { padding: 110px 24px 70px; }\n    .footer-top, .footer-cols, .footer-bottom { padding: 24px; }\n    .footer-cols { grid-template-columns: 1fr; gap: 28px; }\n    .footer-tagline { text-align: left; }\n    footer { padding: 30px 20px; }\n    .projects-grid { grid-template-columns: 1fr; }\n    .project-row { grid-template-columns: 72px 1fr; gap: 12px; }\n    .exp-card { padding: 26px 22px; }\n    .contact-card { padding: 40px 22px; }\n    .hero-creds { grid-template-columns: 1fr; }\n    .hero-cred + .hero-cred { border-left: none; border-top: 1px solid var(--line-2); }\n    .card { padding: 24px 22px; }\n    .hero-actions { flex-direction: column; }\n    .btn, .btn.secondary, .btn.ghost { margin-left: 0; width: 100%; justify-content: center; }\n    .hero-stats { grid-template-columns: repeat(2, 1fr); }\n    .hero-stat:nth-child(2) { border-right: none; }\n    .hero-stat:nth-child(1), .hero-stat:nth-child(2) { border-bottom: 1px solid var(--line); }\n    .palette-trigger { display: none; }\n    .mobile-menu-btn { display: inline-flex; }\n    .back-top { bottom: 16px; left: 16px; }\n    .toast-stack { bottom: 16px; right: 16px; left: 16px; }\n    .toast { max-width: none; }\n  }\n\n 026<\u002Fdiv>\n    <div>© 2026 Mohamed Aziz Chouaibi<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Command palette -->\n<div class=\"palette-overlay\" id=\"palette\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Command palette\" hidden>\n  <div class=\"palette\" role=\"combobox\" aria-expanded=\"true\" aria-haspopup=\"listbox\" aria-owns=\"palette-list\">\n    <input\n      type=\"text\"\n      class=\"palette-input\"\n      id=\"palette-input\"\n      placeholder=\"Type a command or jump to a section…\"\n      autocomplete=\"off\"\n      spellcheck=\"false\"\n      aria-label=\"Search commands\"\n      aria-controls=\"palette-list\"\n      aria-autocomplete=\"list\">\n    <ul class=\"palette-list\" id=\"palette-list\" role=\"listbox\"><\u002Ful>\n    <div class=\"palette-footer\">\n      <span><kbd>↑<\u002Fkbd><kbd>↓<\u002Fkbd> navigate<\u002Fspan>\n      <span><kbd>↵<\u002Fkbd> select · <kbd>Esc<\u002Fkbd> close<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Toast container -->\n<div class=\"toast-stack\" id=\"toast-stack\" aria-live=\"polite\" aria-atomic=\"false\"><\u002Fdiv>\n\n<!-- Back to top -->\n<button type=\"button\" class=\"back-top\" id=\"back-top\" onclick=\"scrollToTop()\" aria-label=\"Back to top\" title=\"Back to top\">\n  <svg aria-hidden=\"true\"><use href=\"#ic-up\"/><\u002Fsvg>\n<\u002Fbutton>\n\n<script>\n(function () {\n  'use strict';\n\n  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  // ───────── Scroll progress ─────────\n  const progressBar = document.getElementById('progress-bar');\n  function onScroll() {\n    const s = document.documentElement;\n    const pct = (s.scrollTop / Math.max(1, s.scrollHeight - s.clientHeight)) * 100;\n    if (progressBar) progressBar.style.width = pct + '%';\n    backTop.classList.toggle('show', s.scrollTop > 480);\n    updateActiveNav();\n  }\n  let ticking = false;\n  window.addEventListener('scroll', () => {\n    if (!ticking) { requestAnimationFrame(() => { onScroll(); ticking = false; }); ticking = true; }\n  }, { passive: true });\n\n  // ───────── Reveal on scroll (sections + cards) ─────────\n  // Mark common card types so the staggered CSS reveal kicks in\n  document.querySelectorAll(\n    '.project-card, .system-card, .now-card, .skill-group, .edu-card, .exp-card, .contact-card'\n  ).forEach(el => el.classList.add('reveal-up'));\n\n  const sectionObserver = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });\n  }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });\n  document.querySelectorAll('section:not(#hero)').forEach(s => sectionObserver.observe(s));\n\n  // ───────── Active nav state ─────────\n  const navLinks = document.querySelectorAll('nav .nav-tabs li');\n  const navTargets = ['hero','projects','experience','skills','contact'];\n  function updateActiveNav() {\n    const scrollY = window.scrollY + 140;\n    let activeIndex = 0;\n    navTargets.forEach((id, i) => {\n      const el = document.getElementById(id);\n      if (el && el.offsetTop <= scrollY) activeIndex = i;\n    });\n    navLinks.forEach((l, i) => l.classList.toggle('is-active', i === activeIndex));\n  }\n\n  // ───────── Theme toggle (persisted, respects system) ─────────\n  const STORAGE_KEY = 'mac-portfolio-theme';\n  function applyTheme(theme) {\n    document.documentElement.setAttribute('data-theme', theme);\n    const meta = document.querySelector('meta[name=\"theme-color\"]:not([media])');\n    if (meta) meta.setAttribute('content', theme === 'light' ? '#ffffff' : '#000000');\n  }\n  function initTheme() {\n    const stored = localStorage.getItem(STORAGE_KEY);\n    if (stored === 'light' || stored === 'dark') { applyTheme(stored); return; }\n    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;\n    applyTheme(prefersLight ? 'light' : 'dark');\n  }\n  window.toggleTheme = function () {\n    const cur = document.documentElement.getAttribute('data-theme') || 'dark';\n    const next = cur === 'light' ? 'dark' : 'light';\n    applyTheme(next);\n    localStorage.setItem(STORAGE_KEY, next);\n    toast((next === 'light' ? 'Light' : 'Dark') + ' mode on');\n  };\n  initTheme();\n\n  // ───────── Toasts ─────────\n  const toastStack = document.getElementById('toast-stack');\n  function toast(msg, ms) {\n    if (!toastStack) return;\n    const t = document.createElement('div');\n    t.className = 'toast';\n    t.textContent = msg;\n    toastStack.appendChild(t);\n    setTimeout(() => {\n      t.classList.add('leaving');\n      setTimeout(() => t.remove(), 220);\n    }, ms || 2200);\n  }\n  window.toast = toast;\n\n  // ───────── Copy email ─────────\n  window.copyEmail = function (e) {\n    if (e) e.preventDefault();\n    const email = 'mohamedaziz.chouaibi@insat.ucar.tn';\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(email).then(() => toast('Email copied → ' + email));\n    } else {\n      const ta = document.createElement('textarea');\n      ta.value = email;\n      document.body.appendChild(ta);\n      ta.select();\n      try { document.execCommand('copy'); toast('Email copied → ' + email); }\n      catch (_) { toast('Copy failed — please copy manually'); }\n      ta.remove();\n    }\n  };\n\n  // ───────── Back to top ─────────\n  const backTop = document.getElementById('back-top');\n  window.scrollToTop = function () {\n    window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });\n  };\n\n  // ───────── Mobile drawer ─────────\n  const drawer = document.getElementById('mobile-drawer');\n  const menuBtn = document.querySelector('.mobile-menu-btn');\n  window.toggleMobileMenu = function () {\n    const open = drawer.classList.toggle('open');\n    menuBtn.setAttribute('aria-expanded', open ? 'true' : 'false');\n    document.body.style.overflow = open ? 'hidden' : '';\n  };\n  window.closeMobileMenu = function () {\n    drawer.classList.remove('open');\n    menuBtn.setAttribute('aria-expanded', 'false');\n    document.body.style.overflow = '';\n  };\n\n  // ───────── Marquee duplication (seamless loop) ─────────\n  const mq = document.getElementById('marquee-track');\n  if (mq) { mq.innerHTML += mq.innerHTML; }\n\n  // ───────── Stats count-up ─────────\n  function animateCount(el) {\n    const target = parseInt(el.dataset.count || el.textContent, 10);\n    if (isNaN(target)) return;\n    const suffix = el.dataset.suffix || '';\n    if (reduceMotion) { el.textContent = target.toLocaleString() + suffix; return; }\n    const duration = 1400;\n    const start = performance.now();\n    const fmt = (n) => n.toLocaleString() + suffix;\n    function frame(t) {\n      const p = Math.min(1, (t - start) / duration);\n      // easeOutCubic\n      const eased = 1 - Math.pow(1 - p, 3);\n      el.textContent = fmt(Math.floor(target * eased));\n      if (p < 1) requestAnimationFrame(frame);\n      else el.textContent = fmt(target);\n    }\n    requestAnimationFrame(frame);\n  }\n  const statObserver = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) { animateCount(e.target); statObserver.unobserve(e.target); }\n    });\n  }, { threshold: 0.6 });\n  document.querySelectorAll('[data-count]').forEach(el => statObserver.observe(el));\n\n  // ───────── Project card glow follows cursor ─────────\n  if (!reduceMotion) {\n    document.querySelectorAll('.project-card').forEach(card => {\n      card.addEventListener('mousemove', (ev) => {\n        const r = card.getBoundingClientRect();\n        card.style.setProperty('--mx', ((ev.clientX - r.left) / r.width * 100) + '%');\n        card.style.setProperty('--my', ((ev.clientY - r.top) / r.height * 100) + '%');\n      });\n    });\n  }\n\n  // ───────── Command palette ─────────\n  const PALETTE = [\n    { id: 'go-overview',    label: 'Go to Overview',     hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#hero') },\n    { id: 'go-projects',    label: 'Go to Projects',     hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#projects') },\n    { id: 'go-approach',    label: 'Go to Approach',     hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#systems') },\n    { id: 'go-focus',       label: 'Go to Focus Areas',  hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#now') },\n    { id: 'go-experience',  label: 'Go to Experience',   hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#experience') },\n    { id: 'go-skills',      label: 'Go to Skills',       hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#skills') },\n    { id: 'go-education',   label: 'Go to Education',    hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#education') },\n    { id: 'go-contact',     label: 'Go to Contact',      hint: 'Section',  icon: 'ic-arrow',   action: () => jumpTo('#contact') },\n    { id: 'copy-email',     label: 'Copy email address', hint: 'Action',   icon: 'ic-copy',    action: () => copyEmail() },\n    { id: 'send-email',     label: 'Send me an email',   hint: 'External', icon: 'ic-mail',    action: () => location.href = 'mailto:mohamedaziz.chouaibi@insat.ucar.tn' },\n    { id: 'open-github',    label: 'Open GitHub',        hint: 'External', icon: 'ic-link',    action: () => window.open('https://github.com/MohamedAzizChouaibi','_blank','noopener') },\n    { id: 'open-linkedin',  label: 'Open LinkedIn',      hint: 'External', icon: 'ic-link',    action: () => window.open('https://www.linkedin.com/in/mohamed-aziz-chouaibi','_blank','noopener') },\n    { id: 'download-cv',    label: 'Download CV',        hint: 'Action',   icon: 'ic-download',action: () => downloadCV() },\n    { id: 'toggle-theme',   label: 'Toggle theme',       hint: 'Action',   icon: 'ic-sun',     action: () => toggleTheme() },\n  ];\n\n  const palette = document.getElementById('palette');\n  const palInput = document.getElementById('palette-input');\n  const palList = document.getElementById('palette-list');\n  let palFiltered = PALETTE.slice();\n  let palCursor = 0;\n\n  function jumpTo(hash) {\n    const el = document.querySelector(hash);\n    if (!el) return;\n    el.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'start' });\n    history.replaceState(null, '', hash);\n  }\n\n  function renderPalette() {\n    palList.innerHTML = '';\n    if (palFiltered.length === 0) {\n      const li = document.createElement('li');\n      li.className = 'palette-empty';\n      li.setAttribute('role', 'option');\n      li.textContent = 'No matches.';\n      palList.appendChild(li);\n      return;\n    }\n    palFiltered.forEach((item, i) => {\n      const li = document.createElement('li');\n      li.setAttribute('role', 'option');\n      li.dataset.id = item.id;\n      if (i === palCursor) li.classList.add('active');\n      li.innerHTML =\n        '<span class=\"pi\"><svg aria-hidden=\"true\"><use href=\"#' + item.icon + '\"/><\u002Fsvg><\u002Fspan>' +\n        '<span class=\"plabel\"><\u002Fspan>' +\n        '<span class=\"pmeta\"><\u002Fspan>';\n      li.querySelector('.plabel').textContent = item.label;\n      li.querySelector('.pmeta').textContent = item.hint;\n      li.addEventListener('click', () => { runItem(item); });\n      li.addEventListener('mousemove', () => {\n        palCursor = i;\n        palList.querySelectorAll('li').forEach((n, j) => n.classList.toggle('active', j === i));\n      });\n      palList.appendChild(li);\n    });\n  }\n\n  function fuzzy(q, str) {\n    q = q.toLowerCase(); str = str.toLowerCase();\n    if (!q) return 1;\n    let qi = 0;\n    for (let i = 0; i < str.length && qi < q.length; i++) {\n      if (str[i] === q[qi]) qi++;\n    }\n    return qi === q.length ? 1 - (str.indexOf(q[0]) + 1) * 0.001 : 0;\n  }\n\n  function filterPalette() {\n    const q = palInput.value.trim();\n    palFiltered = PALETTE\n      .map(item => ({ item, score: fuzzy(q, item.label + ' ' + item.hint) }))\n      .filter(x => x.score > 0)\n      .sort((a, b) => b.score - a.score)\n      .map(x => x.item);\n    palCursor = 0;\n    renderPalette();\n  }\n\n  function runItem(item) {\n    closePalette();\n    setTimeout(() => item.action(), 60);\n  }\n\n  window.openPalette = function () {\n    palette.hidden = false;\n    palette.classList.add('open');\n    palInput.value = '';\n    filterPalette();\n    setTimeout(() => palInput.focus(), 20);\n    document.body.style.overflow = 'hidden';\n  };\n  function closePalette() {\n    palette.classList.remove('open');\n    palette.hidden = true;\n    document.body.style.overflow = '';\n  }\n\n  palInput && palInput.addEventListener('input', filterPalette);\n  palInput && palInput.addEventListener('keydown', (e) => {\n    if (e.key === 'ArrowDown') {\n      e.preventDefault();\n      palCursor = Math.min(palCursor + 1, palFiltered.length - 1);\n      renderPalette();\n    } else if (e.key === 'ArrowUp') {\n      e.preventDefault();\n      palCursor = Math.max(palCursor - 1, 0);\n      renderPalette();\n    } else if (e.key === 'Enter') {\n      e.preventDefault();\n      const item = palFiltered[palCursor];\n      if (item) runItem(item);\n    } else if (e.key === 'Escape') {\n      e.preventDefault();\n      closePalette();\n    }\n  });\n  palette && palette.addEventListener('click', (e) => {\n    if (e.target === palette) closePalette();\n  });\n\n  // ───────── Global keyboard shortcuts ─────────\n  document.addEventListener('keydown', (e) => {\n    const isMod = e.metaKey || e.ctrlKey;\n    const inField = /^(input|textarea|select)$/i.test((e.target && e.target.tagName) || '');\n    if (isMod && (e.key === 'k' || e.key === 'K')) {\n      e.preventDefault();\n      if (palette.classList.contains('open')) closePalette(); else openPalette();\n    } else if (e.key === 'Escape') {\n      if (palette.classList.contains('open')) closePalette();\n      if (drawer.classList.contains('open')) closeMobileMenu();\n    } else if (!inField && !isMod && (e.key === 't' || e.key === 'T')) {\n      toggleTheme();\n    } else if (!inField && !isMod && (e.key === '/' || e.key === '?')) {\n      e.preventDefault();\n      openPalette();\n    } else if (!inField && !isMod && e.key === 'g') {\n      // tiny \"g + s\" style — wait next key for section\n      const handler = (e2) => {\n        const map = { p: '#projects', e: '#experience', s: '#skills', c: '#contact', h: '#hero', o: '#hero', f: '#now', a: '#systems' };\n        if (map[e2.key]) jumpTo(map[e2.key]);\n        document.removeEventListener('keydown', handler, true);\n      };\n      document.addEventListener('keydown', handler, true);\n      setTimeout(() => document.removeEventListener('keydown', handler, true), 900);\n    }\n  });\n\n  // ───────── Download CV placeholder ─────────\n  window.downloadCV = function () {\n    var a = document.createElement('a');\n    a.href = 'MohamedAzizChouaibi_CV.pdf';\n    a.download = 'MohamedAzizChouaibi_CV.pdf';\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    toast('Downloading CV…', 2000);\n  };\n\n  // ───────── Initial paint ─────────\n  onScroll();\n\n  // Print friendly banner once\n  console.log('%c mohamedaziz.chouaibi ', 'background:#000;color:#2dd4d4;font:600 14px/1.5 ui-monospace,monospace;padding:6px 10px;border:1px solid #2dd4d4');\n  console.log('%c Tip: press ⌘K or / to open the command palette · T to toggle theme ', 'color:#888;font:13px/1.5 ui-monospace,monospace');\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
